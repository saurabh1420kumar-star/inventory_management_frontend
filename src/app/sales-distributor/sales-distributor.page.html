<!-- HEADER -->
<ion-header class="ion-no-border">
  <ion-toolbar style="--background: rgba(13,17,23,0.95); --border-width: 0; backdrop-filter: blur(20px);">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/dashboard" style="color: #e2e8f0;"></ion-back-button>
    </ion-buttons>
    <ion-title>
      <span style="color: #10b981; font-weight: 800; font-size: 1.125rem;">Sales</span>
      <span style="color: #e2e8f0; font-weight: 700; font-size: 1.125rem;"> Distributor</span>
    </ion-title>
  </ion-toolbar>
</ion-header>

<!-- CONTENT -->
<ion-content style="--background: #0d1117;">
  <div class="min-h-screen pb-10" style="background: #0d1117;">
    <div class="max-w-7xl mx-auto px-4 py-6">

      <!-- Hero Glass Card -->
      <div class="relative rounded-2xl overflow-hidden mb-6"
        style="background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.2); backdrop-filter: blur(16px); box-shadow: 0 0 40px rgba(16,185,129,0.06);">
        <div class="absolute top-0 right-0 -mr-12 -mt-12 w-40 h-40 rounded-full" style="background: rgba(16,185,129,0.06); filter: blur(40px);"></div>
        <div class="relative px-5 py-5">
          <div class="flex items-center gap-3">
            <div class="w-11 h-11 rounded-xl flex items-center justify-center"
              style="background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.25);">
              <ion-icon name="storefront-outline" class="text-xl" style="color: #10b981;"></ion-icon>
            </div>
            <div>
              <h1 class="text-lg font-bold text-white tracking-tight">Distributor Management</h1>
              <p class="text-xs" style="color: #64748b;">Manage your sales distributor network</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Info Glass Card -->
      <div class="rounded-xl p-5 text-center"
        style="background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(12px); box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);">
        <div class="w-14 h-14 rounded-xl flex items-center justify-center mx-auto mb-3"
          style="background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2);">
          <ion-icon name="people-outline" class="text-2xl" style="color: #10b981;"></ion-icon>
        </div>
        <h2 class="text-base font-bold text-white mb-1">Coming Soon</h2>
        <p class="text-xs" style="color: #64748b;">Distributor management features are being developed. Check back soon.</p>
      </div>

    </div>
  </div>
</ion-content>
